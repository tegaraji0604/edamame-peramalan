{% extends 'base.html' %}
{% block title %}Login – Edamame Peramalan{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="leaf-icon">🌱</span>
    </div>
    <h1 class="auth-title">LOGIN</h1>

    <form method="POST" action="{{ url_for('login') }}" id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="admin@gmail.com" required autocomplete="email"
               value="{{ request.form.get('email','') }}"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Kata Sandi</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary" id="btn-login">Masuk</button>
    </form>

    <a href="{{ url_for('register') }}" class="btn btn-dark" id="btn-daftar">Daftar Akun Baru</a>

    <div class="auth-divider" style="margin-top:16px;">
      <a href="{{ url_for('index') }}">← Kembali ke Beranda</a>
    </div>
  </div>
</div>
{% endblock %}
