{% extends 'base.html' %}
{% block title %}Register – Edamame Peramalan{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="leaf-icon">🌱</span>
    </div>
    <h1 class="auth-title">REGISTER</h1>

    <form method="POST" action="{{ url_for('register') }}" id="register-form">
      <div class="form-group">
        <label class="form-label" for="nama">Nama Lengkap</label>
        <input class="form-control" type="text" id="nama" name="nama"
               placeholder="Masukkan nama lengkap" required
               value="{{ request.form.get('nama','') }}"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="admin@gmail.com" required autocomplete="email"
               value="{{ request.form.get('email','') }}"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Kata Sandi</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Min. 6 karakter" required autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Ulangi Kata Sandi</label>
        <input class="form-control" type="password" id="confirm_password" name="confirm_password"
               placeholder="Ulangi kata sandi" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-primary" id="btn-daftar-submit">Daftar Akun Baru</button>
    </form>

    <div class="auth-divider">
      Sudah punya akun? <a href="{{ url_for('login') }}">Login</a>
    </div>
  </div>
</div>

{% block extra_js %}
<script>
document.getElementById('register-form').addEventListener('submit', function(e) {
  const pw  = document.getElementById('password').value;
  const cpw = document.getElementById('confirm_password').value;
  if (pw !== cpw) {
    e.preventDefault();
    alert('Kata sandi tidak cocok!');
  }
});
</script>
{% endblock %}
{% endblock %}
