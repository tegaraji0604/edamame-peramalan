services:
  # ── Flask Backend ──────────────────────────────────────────
  - type: web
    name: edamame-peramalan
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false

  # ── Expo Web App (Static Site) ─────────────────────────────
  - type: web
    name: edamame-expo-web
    runtime: static
    rootDir: edamameApp
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_API_URL
        sync: false
